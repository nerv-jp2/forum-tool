<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: "Yusei Magic", sans-serif;
            background: radial-gradient(circle at top, #190000, #020000 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 20px;
            padding: 20px 0;
            color: #ffd0d0;
        }

        .co {
            background: linear-gradient(145deg, #120000, #040000);
            padding: 30px;
            border-radius: 18px;
            box-shadow:
                0 0 30px rgba(255, 0, 0, 0.18),
                inset 0 0 20px rgba(255, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 60, 60, 0.22);
        }

        .sub-co {
            width: 340px;
            background-color: #090000;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.04);
            font-size: 13px;
            text-align: center;
            border: 1px solid rgba(255, 40, 40, 0.14);
        }

        .embed-box {
            width: 300px;
            border-left: 4px solid #ff3d3d;
            background-color: rgba(255, 0, 0, 0.03);
            padding: 4px 6px;
            margin: 10px auto;
            border-radius: 4px;
            font-size: 13px;
            white-space: pre-wrap;
        }

        #log-container {
            width: 100%;
            min-height: 120px;
            background-color: #050000;
            border: 1px solid rgba(255, 50, 50, 0.18);
            font-size: 12px;
            color: #ff7a7a;
            padding: 10px;
            word-break: break-all;
            white-space: pre-wrap;
            height: 30px;
            overflow-y: auto;
        }

        #nerv {
            width: 100px;
            height: 20px;
            background: linear-gradient(90deg, #8f0000, #c91d1d);
            display: flex;
            border-radius: 5px;
            border: none;
            color: #ffffff;
            font-family: inherit;
            justify-content: center;
            align-items: center;
        }

        #tokens, #channel, #thread-name, #thread-message, #loop-count, #wait-time {
            border: 2px solid rgba(255, 45, 45, 0.18);
            border-radius: 8px;
            padding: 5px;
            outline: none;
            width: 280px;
            font-family: inherit;
            background-color: #070000;
            color: #ffffff;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 280px;
        }

        .input-row input {
            flex: 1;
            border: 2px solid rgba(255, 45, 45, 0.18);
            border-radius: 8px;
            padding: 5px;
            outline: none;
            min-width: 0;
            background-color: #070000;
            color: #ffffff;
        }

        .server-link {
            display: inline-block;
            background: linear-gradient(90deg, #7a0000, #c91d1d);
            color: white;
            text-decoration: none;
            padding: 5px 20px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="co">
        <div style="text-align: center;">
            <h1 style="color:#ff5b5b;">NERV Forum Tool</h1>
            <p style="opacity: 0.35;">Command Interface</p>
            <div class="embed-box">NERV製のツールです<br>UIデザインのみ変更</div>
        </div>

        <div><textarea id="channel" rows="1" cols="30" placeholder="フォーラムのチャンネルID"></textarea></div>
        <div><textarea id="thread-name" rows="1" cols="30" placeholder="投稿タイトル"></textarea></div>
        <div><textarea id="thread-message" rows="1" cols="30" placeholder="メッセージ"></textarea></div>
        <div><textarea id="tokens" rows="2" cols="30" placeholder="トークン（複数可）"></textarea></div>

        <div class="input-row">
            <input type="number" id="loop-count" placeholder="ループ数">
            <input type="number" id="wait-time" placeholder="間隔(ms)">
        </div>

        <div class="input-row" style="justify-content: center;">
            <button id="nerv">生成</button>
        </div>

        <div id="log-container"></div>
        <p style="opacity: 0.4; font-size: 12px; margin: -5px; margin-top: 0px;">-  -</p>
    </div>
</body>
</html>
