<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: "Yusei Magic", sans-serif;
            background: radial-gradient(circle at top, #1a0000, #030000 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 20px;
            padding: 20px 0;
            color: #ffb3b3;
        }

        .co {
            background: linear-gradient(145deg, #120000, #050000);
            padding: 30px;
            border-radius: 15px;
            box-shadow:
                0 0 30px rgba(255, 0, 0, 0.25),
                inset 0 0 15px rgba(255, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 0, 0, 0.35);
        }

        .sub-co {
            width: 340px;
            background-color: #0a0000;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.1);
            font-size: 13px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.25);
        }

        .embed-box {
            width: 300px;
            border-left: 4px solid #ff3b3b;
            background-color: rgba(255, 0, 0, 0.06);
            padding: 4px 6px;
            margin: 10px auto;
            border-radius: 4px;
            font-size: 13px;
            white-space: pre-wrap;
        }

        #log-container {
            width: 100%;
            min-height: 120px;
            background-color: #000;
            border: 1px solid rgba(255, 0, 0, 0.4);
            font-size: 12px;
            color: #ff4d4d;
            padding: 10px;
            word-break: break-all;
            white-space: pre-wrap;
            height: 30px;
            overflow-y: auto;
        }

        #nerv {
            width: 100px;
            height: 20px;
            background: linear-gradient(90deg, #ff2a2a, #660000);
            display: flex;
            border-radius: 5px;
            border: 1px solid #ff0000;
            color: #ffffff;
            font-family: inherit;
            justify-content: center;
            align-items: center;
        }

        #tokens, #channel, #thread-name, #thread-message, #loop-count, #wait-time {
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 8px;
            padding: 5px;
            outline: none;
            width: 280px;
            font-family: inherit;
            background-color: #050000;
            color: #ffffff;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 280px;
        }

        .input-row input {
            flex: 1;
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 8px;
            padding: 5px;
            outline: none;
            min-width: 0;
            background-color: #050000;
            color: #ffffff;
        }

        .server-link {
            display: inline-block;
            background: linear-gradient(90deg, #ff0000, #660000);
            color: white;
            text-decoration: none;
            padding: 5px 20px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="co">
        <div style="text-align: center;">
            <h1>NERV Forum Tool</h1>
            <p style="opacity: 0.2;">ディスコードでフォーラムスパムできます</p>
            <div class="embed-box">NERV製のツールです<br>文末にクレジットがつきます！</div>
        </div>
        <div><textarea id="channel" rows="1" cols="30" placeholder="フォーラムのチャンネルID"></textarea></div>
        <div><textarea id="thread-name" rows="1" cols="30" placeholder="投稿タイトル"></textarea></div>
        <div><textarea id="thread-message" rows="1" cols="30" placeholder="フォーラムのメッセージ(ランダム文字列使用で任意)"></textarea></div>
        <div><textarea id="tokens" rows="2" cols="30" placeholder="トークン（複数可）"></textarea></div>
        <div class="input-row">
            <input type="number" id="loop-count" placeholder="ループ数">
            <input type="number" id="wait-time" placeholder="間隔(ms)">
        </div>
        <div class="input-row" style="justify-content: center; align-items: center; font-size: 13px;">
    <span>ランダム文字列</span>
    <input type="checkbox" id="random-toggle">
    <div id="random-len-container" style="display: none;">
        <input type="number" id="random-len" placeholder="文字数" style="width: 60px; margin-left: 10px; font-family: inherit;">
    </div>
</div>
<div class="input-row">
    <button id="nerv">生成</button>
    <button id="stop" style="background-color: #ff4500; color: white; border: none; border-radius: 5px; flex: 1; display: none;">停止</button>
</div>

        <div id="log-container"></div>
        <p style="opacity: 0.4; font-size: 12px; margin: -5px; margin-top: 0px;">-  -</p>
    </div>
